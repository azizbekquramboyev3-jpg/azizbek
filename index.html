<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azizbek Web 😎</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#000428,#004e92);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.box{
    text-align:center;
    padding:30px;
    border:2px solid cyan;
    border-radius:20px;
    box-shadow:0 0 20px cyan;
    animation:boxGlow 2s infinite alternate;
}

h1{
    color:white;
    text-shadow:0 0 10px cyan,
                0 0 20px cyan,
                0 0 40px cyan;
    animation:zoom 2s infinite;
}

p{
    color:#fff;
    font-size:20px;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:cyan;
    color:black;
    text-decoration:none;
    font-weight:bold;
    border-radius:30px;
    transition:.3s;
}

.btn:hover{
    background:white;
    transform:scale(1.1);
    box-shadow:0 0 20px cyan;
}

@keyframes zoom{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

@keyframes boxGlow{
    from{box-shadow:0 0 20px cyan;}
    to{box-shadow:0 0 50px #00ffff;}
}
</style>

</head>
<body>

<div class="box">
<h1>👋 Salom Azizbek!</h1>

<marquee scrollamount="10">
✨ Web dasturlash olamiga xush kelibsiz! ✨
</marquee>

<p>Bu CSS animatsiyali neon effektli sahifa.</p>

<a class="btn" href="https://youtube.com" target="_blank">
YouTube
</a>

</div>

</body>
</html>
